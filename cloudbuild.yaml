steps:
  # Step 1: Run Backend Tests
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    dir: 'backend'
    args: ['ci', '--include=dev']
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    dir: 'backend'
    args: ['test']

  # Step 2: Run Frontend Tests
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    dir: 'frontend'
    args: ['ci', '--include=dev', '--legacy-peer-deps']
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    dir: 'frontend'
    args: ['test']

  # Step 3: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/smart-venuex-ai:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/smart-venuex-ai:latest'
      - '.'

  # Step 4: Push image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/smart-venuex-ai:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/smart-venuex-ai:latest']

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'smart-venuex-ai'
      - '--image=gcr.io/$PROJECT_ID/smart-venuex-ai:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'

images:
  - 'gcr.io/$PROJECT_ID/smart-venuex-ai:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/smart-venuex-ai:latest'

options:
  logging: CLOUD_LOGGING_ONLY
